version: '3.8'

# Volumes — это папки, которые живут вне контейнеров
volumes:
  pg_data:
  static:
  media:

services:

  postgres:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend/
    env_file: .env
    depends_on:
      - postgres
    volumes:
      - static:/app/collected_static
      - media:/app/media
    restart: always

  frontend:
    build: ./frontend/
    volumes:
      - static:/app/build/
    restart: always

  gateway:
    build: ./nginx/
    ports:
      - "9000:80"
    volumes:
      - static:/static
      - media:/media
    depends_on:
      - backend
      - frontend
    restart: always

