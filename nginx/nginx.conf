server { 
    listen 80; 
    server_tokens off;

    location /api/ { 
        proxy_pass http://backend:8000; 
        proxy_set_header Host $host; 
    } 

    location /admin/ { 
        proxy_pass http://backend:8000; 
        proxy_set_header Host $host; 
    } 

    location /media/ { 
        alias /media/; 
    } 

    location /static/admin/ {
        root /static/;
    }

    location /static/rest_framework/ {
        root /static/;
    }

    location / { 
        root /static/; 
        index index.html; 
        try_files $uri $uri/ /index.html; 
    } 
}