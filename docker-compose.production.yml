volumes:
  pg_data:
  backend_static:
  frontend_static:
  media:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: ${DOCKERHUB_USERNAME}/kittygram_backend:latest
    env_file: .env
    restart: always
    volumes:
      - backend_static:/backend_static/
      - media:/app/media/
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             cp -r /app/static/. /backend_static/ &&
             gunicorn --bind 0.0.0.0:8000 kittygram_backend.wsgi:application"
    depends_on:
      - db

  frontend:
    image: ${DOCKERHUB_USERNAME}/kittygram_frontend:latest
    restart: always
    volumes:
      - frontend_static:/frontend_static/
    command: >
      sh -c "cp -r /app/build/. /frontend_static/ && tail -f /dev/null"

  gateway:
    image: ${DOCKERHUB_USERNAME}/kittygram_gateway:latest
    restart: always
    volumes:
      - backend_static:/backend_static/
      - frontend_static:/frontend_static/
      - media:/media/
    ports:
      - "9000:80"
    depends_on:
      - backend
      - frontend